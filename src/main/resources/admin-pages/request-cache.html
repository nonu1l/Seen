<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request Cache</title>
<style>
  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --border: #e5e5ea;
    --text: #1d1d1f;
    --muted: #8e8e93;
    --accent: #0071e3;
    --accent-dim: #d6e4f5;
    --green: #248a3d;
    --orange: #c46b08;
    --cyan: #0077b6;
    --red: #d93d3d;
    --hover: rgba(0,0,0,.04);
    --active: rgba(0,113,227,.08);
    --heading: #1d1d1f;
    --btn-hover-bg: #e5e5ea;
    --btn-hover-text: #1d1d1f;
    --code-text: #3a3a40;
  }
  [data-theme="dark"] {
    --bg: #0b0b10;
    --surface: #13131c;
    --border: #1e1e2e;
    --text: #c4c4d0;
    --muted: #6b6b7b;
    --accent: #7aa2f7;
    --accent-dim: #3b4268;
    --green: #9ece6a;
    --orange: #e0af68;
    --cyan: #7dcfff;
    --red: #f7768e;
    --hover: rgba(255,255,255,.03);
    --active: rgba(122,162,247,.08);
    --heading: #ffffff;
    --btn-hover-bg: #2a2a3e;
    --btn-hover-text: #ffffff;
    --code-text: #bbb;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font:13px/1.5 "SF Mono", "Cascadia Code", "JetBrains Mono", ui-monospace, monospace;
    background: var(--bg); color: var(--text);
    display:flex; height:100vh; overflow:hidden;
  }
  .left {
    width: 460px; min-width: 360px; flex-shrink:0;
    border-right:1px solid var(--border);
    display:flex; flex-direction:column; background:var(--surface);
  }
  .left-header {
    padding:16px 18px 12px; border-bottom:1px solid var(--border);
    display:flex; justify-content:space-between; align-items:center; gap:12px;
  }
  .left-header h1 { font-size:14px; font-weight:600; color:var(--heading); letter-spacing:.5px; }
  .btn {
    background:var(--border); border:none; color:var(--text); padding:4px 12px;
    border-radius:4px; cursor:pointer; font:inherit; font-size:12px;
  }
  .btn:hover { background:var(--btn-hover-bg); color:var(--btn-hover-text); }
  .filter-bar { padding:10px 18px; border-bottom:1px solid var(--border); display:flex; gap:8px; }
  .filter-bar input {
    width:100%; border:1px solid var(--border); border-radius:4px; background:var(--bg);
    color:var(--text); font:inherit; font-size:12px; padding:6px 8px; outline:none;
  }
  .filter-bar input:focus { border-color:var(--accent); }
  .stats-bar { padding:8px 18px; font-size:11px; color:var(--muted); border-bottom:1px solid var(--border); }
  .list-wrap { flex:1; overflow-y:auto; padding:8px 0 16px; }
  .list-wrap::-webkit-scrollbar, .right-content::-webkit-scrollbar, .section-text::-webkit-scrollbar { width:4px; }
  .list-wrap::-webkit-scrollbar-thumb, .right-content::-webkit-scrollbar-thumb, .section-text::-webkit-scrollbar-thumb {
    background:var(--border); border-radius:2px;
  }
  .cache-row {
    display:grid; grid-template-columns:58px 1fr auto; gap:8px; align-items:center;
    padding:8px 18px; cursor:pointer; border-left:2px solid transparent;
    transition:background .1s;
  }
  .cache-row:hover { background:var(--hover); }
  .cache-row.active { background:var(--active); border-left-color:var(--accent); }
  .method {
    display:inline-flex; justify-content:center; border-radius:4px; padding:2px 0;
    font-size:11px; font-weight:600; color:#fff;
  }
  .method.GET { background:var(--cyan); }
  .method.POST { background:var(--orange); }
  .method.MISS, .method.UNKNOWN { background:var(--red); }
  .main { min-width:0; }
  .url { color:var(--heading); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .body-preview { color:var(--muted); font-size:11px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:2px; }
  .row-meta { color:var(--muted); font-size:11px; text-align:right; white-space:nowrap; }
  .right { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  .right-empty { flex:1; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:13px; }
  .right-content { flex:1; overflow-y:auto; padding:20px 24px; display:none; }
  .right-content.visible { display:block; }
  .detail-header {
    border-bottom:1px solid var(--border); padding-bottom:12px; margin-bottom:20px;
    display:flex; justify-content:space-between; align-items:baseline; gap:16px;
  }
  .detail-header .dh-node { font-size:14px; font-weight:600; color:var(--heading); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .detail-header .dh-meta { font-size:11px; color:var(--muted); white-space:nowrap; }
  .detail-grid {
    display:grid; grid-template-columns:repeat(3, minmax(0, 1fr)); gap:10px; margin-bottom:14px;
  }
  .metric {
    background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:10px 12px;
  }
  .metric-label { color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:1px; }
  .metric-value { color:var(--heading); font-size:14px; margin-top:4px; }
  .call-card {
    background:var(--surface); border:1px solid var(--border); border-radius:6px;
    margin-bottom:14px; overflow:hidden;
  }
  .call-card-head {
    display:flex; justify-content:space-between; align-items:center;
    padding:10px 14px; border-bottom:1px solid var(--border); font-size:12px;
  }
  .call-card-head .cc-index { color:var(--accent); font-weight:600; }
  .call-card-head .cc-meta { color:var(--muted); }
  .section { border-bottom:1px solid var(--border); }
  .section:last-child { border-bottom:none; }
  .section-label {
    font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:1px;
    padding:8px 14px 0; color:var(--muted);
  }
  .section-text {
    padding:8px 14px 10px; font:12px/1.55 "SF Mono", "Cascadia Code", "JetBrains Mono", ui-monospace, monospace;
    color:var(--code-text); white-space:pre-wrap; word-break:break-word; max-height:420px; overflow-y:auto;
  }
  .section-text.empty { color:var(--muted); font-style:italic; }
</style>
</head>
<body>
<div class="left">
  <div class="left-header">
    <h1>Request Cache</h1>
    <span style="display:flex;gap:6px">
      <button class="btn" id="theme-btn" onclick="toggleTheme()">Light</button>
      <button class="btn" onclick="fetchEntries()">Refresh</button>
    </span>
  </div>
  <div class="filter-bar">
    <input id="filter" placeholder="Filter by method, URL, request body..." oninput="renderList()">
  </div>
  <div class="stats-bar" id="stats"></div>
  <div class="list-wrap" id="list"></div>
</div>

<div class="right">
  <div class="right-empty" id="right-empty">Select a cache entry to view detail</div>
  <div class="right-content" id="right-content"></div>
</div>

<script>
let entries = [];
let activeKey = null;

async function fetchEntries() {
  document.getElementById('list').innerHTML = '<div class="cache-row"><div class="main"><div class="url" style="color:var(--muted)">Loading...</div></div></div>';
  try {
    const res = await fetch('/api/admin/request-cache/entries');
    entries = await res.json();
    renderList();
  } catch (e) {
    document.getElementById('list').innerHTML = `<div class="cache-row"><div class="main"><div class="url" style="color:var(--red)">Error: ${esc(e.message)}</div></div></div>`;
  }
}

function renderList() {
  const q = document.getElementById('filter').value.trim().toLowerCase();
  const filtered = entries.filter(e => {
    const haystack = `${e.method} ${e.url} ${e.requestBodyPreview || ''}`.toLowerCase();
    return !q || haystack.includes(q);
  });
  const totalBytes = filtered.reduce((sum, e) => sum + (e.responseBytes || 0), 0);
  document.getElementById('stats').textContent =
    `${filtered.length} entries · ${formatBytes(totalBytes)} · ${entries.length} total`;

  if (!filtered.length) {
    document.getElementById('list').innerHTML = '<div class="cache-row"><div class="main"><div class="url" style="color:var(--muted)">No cache entries</div></div></div>';
    return;
  }

  document.getElementById('list').innerHTML = filtered.map(e => {
    const index = entries.indexOf(e);
    const active = e.key === activeKey ? ' active' : '';
    return `<div class="cache-row${active}" data-index="${index}" onclick="selectEntry(this)">
      <span class="method ${esc(e.method)}">${esc(e.method)}</span>
      <div class="main">
        <div class="url">${esc(e.url || '(empty URL)')}</div>
        <div class="body-preview">${esc(e.requestBodyPreview || '')}</div>
      </div>
      <div class="row-meta">
        <div>${formatBytes(e.responseBytes || 0)}</div>
        <div>${formatDuration(e.remainingSeconds || 0)}</div>
      </div>
    </div>`;
  }).join('');
}

async function selectEntry(row) {
  document.querySelectorAll('.cache-row.active').forEach(r => r.classList.remove('active'));
  row.classList.add('active');
  const entry = entries[Number(row.dataset.index)];
  activeKey = entry ? entry.key : '';
  await loadDetail(activeKey);
}

async function loadDetail(key) {
  const empty = document.getElementById('right-empty');
  const content = document.getElementById('right-content');
  empty.style.display = 'none';
  content.classList.add('visible');
  content.innerHTML = '<span style="color:var(--muted)">Loading...</span>';

  try {
    const res = await fetch(`/api/admin/request-cache/detail?key=${encodeURIComponent(key)}`);
    const d = await res.json();
    content.innerHTML = `<div class="detail-header">
      <span class="dh-node">${esc(d.url || d.key)}</span>
      <span class="dh-meta">${esc(d.method)} · ${formatBytes(d.responseBytes || 0)}</span>
    </div>
    <div class="detail-grid">
      <div class="metric"><div class="metric-label">Remaining TTL</div><div class="metric-value">${formatDuration(d.remainingSeconds || 0)}</div></div>
      <div class="metric"><div class="metric-label">Cached For</div><div class="metric-value">${formatDuration(d.cachedSecondsAgo || 0)}</div></div>
      <div class="metric"><div class="metric-label">Response Size</div><div class="metric-value">${formatBytes(d.responseBytes || 0)}</div></div>
    </div>
    <div class="call-card">
      <div class="call-card-head"><span class="cc-index">Request</span><span class="cc-meta">${esc(d.method)}</span></div>
      <div class="section"><div class="section-label">Key</div><div class="section-text">${esc(d.key || '')}</div></div>
      <div class="section"><div class="section-label">URL</div><div class="section-text">${esc(d.url || '')}</div></div>
      <div class="section"><div class="section-label">Request Body</div><div class="section-text${d.requestBody ? '' : ' empty'}">${d.requestBody ? esc(d.requestBody) : '(empty)'}</div></div>
    </div>
    <div class="call-card">
      <div class="call-card-head"><span class="cc-index">Response</span><span class="cc-meta">${formatBytes(d.responseBytes || 0)}</span></div>
      <div class="section"><div class="section-label">Body</div><div class="section-text${d.responseBody ? '' : ' empty'}">${d.responseBody ? esc(d.responseBody) : '(empty)'}</div></div>
    </div>`;
  } catch (e) {
    content.innerHTML = `<span style="color:var(--red)">Failed to load: ${esc(e.message)}</span>`;
  }
}

function formatBytes(bytes) {
  if (bytes < 1024) return `${bytes} B`;
  if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
  return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
}

function formatDuration(seconds) {
  if (seconds < 60) return `${seconds}s`;
  if (seconds < 3600) return `${Math.floor(seconds / 60)}m ${seconds % 60}s`;
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  return `${h}h ${m}m`;
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function getTheme() { return document.documentElement.getAttribute('data-theme')||'light'; }
function setTheme(t) {
  const btn = document.getElementById('theme-btn');
  if (t === 'dark') {
    document.documentElement.setAttribute('data-theme','dark');
    btn.textContent = 'Dark';
  } else {
    document.documentElement.removeAttribute('data-theme');
    btn.textContent = 'Light';
  }
  localStorage.setItem('request-cache-theme', t);
}
function toggleTheme() { setTheme(getTheme()==='dark'?'light':'dark'); }
setTheme(localStorage.getItem('request-cache-theme')||'light');

document.addEventListener('DOMContentLoaded', fetchEntries);
</script>
</body>
</html>
