# yaml-language-server: $schema=
server:
  port: 8081

app:
  search:
#   是否启用外部搜索源；设为 false 时 web_search 返回空，方便验证 fetch_url 直访 URL fallback
    enabled: ${WEB_SEARCH_ENABLED:true}
  endpoints:
#    bangumi 默认 api  / https://bangumi.github.io
    bangumi-api-base: "${BANGUMI_API_BASE:https://api.bgm.tv/v0}"
#   lite版 duckduckgo 地址，用于搜索，一般会被墙
    duckduckgo-lite-search-url: "${DUCKDUCKGO_LITE_SEARCH_URL:https://lite.duckduckgo.com/lite/?q=}"
#   serper搜索，免费，需要api key / https://serper.dev/
    serper-search-url: "${SERPER_SEARCH_URL:https://google.serper.dev/search}"

spring:
  datasource:
    url: jdbc:sqlite:data/media.db?journal_mode=WAL&busy_timeout=3000
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: update
#    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        session:
          events:
            log:
              LOG_QUERIES_SLOWER_THAN_MS: 0
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql
  ai:
    model:
      chat: none
      embedding: none
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none
logging:
  level:
    org.hibernate.SQL: DEBUG
    com.nonu1l.media.agent.tool.AiBangumiTools: DEBUG
    com.nonu1l.media.service.WebSearchService: DEBUG
    com.nonu1l.media.service.SerperSearchService: DEBUG
    com.nonu1l.media.service.DDGSearchService: DEBUG
    com.nonu1l.media.agent.AgentService: DEBUG
    com.nonu1l.media.config.TokenUsageAdvisor: DEBUG
    com.nonu1l.media.config.DeepSeekThinkingDisableInterceptor: DEBUG
#    org.hibernate.orm.jdbc.bind: TRACE
#    org.hibernate.SQL_SLOW: INFO
#    com.nonu1l.media.service.PreCacheService: DEBUG
#    com.nonu1l.media.cache.CaffeineRequestCacheAspect: DEBUG
